    # ─────────────────────────────────────────
    # INTERNAL та Помилки
    # ─────────────────────────────────────────
    location /internal/ {
        return 403 '{"error":"forbidden"}';
        add_header Content-Type application/json;
    }

    error_page 429 /429.json;
    location = /429.json {
        internal;
        return 429 '{"error":"too_many_requests","message":"Забагато запитів, спробуйте через хвилину"}';
        add_header Content-Type application/json;
    }

    error_page 502 503 504 /5xx.json;
    location = /5xx.json {
        internal;
        return 503 '{"error":"service_unavailable","message":"Сервіс тимчасово недоступний"}';
        add_header Content-Type application/json;
    }
}