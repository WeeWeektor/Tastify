# ─────────────────────────────────────────────────────────────
# Upstream блоки
# Назва в proxy_pass = container_name в docker-compose
# keepalive = кількість постійних з'єднань в пулі (не потоки!)
# ─────────────────────────────────────────────────────────────

upstream auth_service {
    server auth_service:8000;
    keepalive 16;
}

